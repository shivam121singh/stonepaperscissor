<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header Layout */
        .head {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
        }

        .head h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        /* Scoreboard Grid */
        .info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .score-box {
            text-align: center;
        }

        .score-box p:last-child {
            font-size: 0.9rem;
            color: #e94560;
            font-weight: bold;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .score-num {
            font-size: 3rem;
            font-weight: bold;
            color: #4ef037;
        }

        /* Choices Section (Responsive Grid/Flex) */
        .choices {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            width: 100%;
        }

        .choice {
            background: #0f3460;
            border-radius: 50%;
            padding: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .choice:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #e94560;
            background: #e94560;
        }

        /* Main Message / Result display */
        .msgcont {
            margin-bottom: 25px;
            text-align: center;
        }

        #msg {
            background-color: #4ef037;
            color: #1a1a2e;
            padding: 12px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(78, 240, 55, 0.3);
            transition: all 0.3s ease;
        }

        /* Guide / Move History Box */
        .game-status-box {
            background: #0f3460;
            border: 2px dashed #e94560;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
            color: #b5c0d0;
        }

        .game-status-box span {
            color: #ffffff;
            font-weight: bold;
        }

        /* Action Buttons */
        .reset {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 25px;
            background-color: #e94560;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4);
        }

        .reset:hover {
            background-color: #ff5e7e;
        }
        
        .reset:active {
            transform: scale(0.95);
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .choice {
                width: 90px;
                height: 90px;
            }
            .head h1 {
                font-size: 1.4rem;
            }
            .score-num {
                font-size: 2.3rem;
            }
        }
    </style>
</head>
<body>

<div class="head">
    <h1>🎮 ROCK PAPER SCISSORS</h1> 
</div>

<div class="info">
    <div class="score-box">
        <p id="uscore" class="score-num">0</p>
        <p>YOU</p>
    </div>
    <div class="score-box">
        <p id="cscore" class="score-num">0</p>
        <p>COMP</p>
    </div>
</div>

<div class="choices">
    <div class="choice" id="rock">
        <img src="rock.jpg" alt="Rock">
    </div>
    <div class="choice" id="paper">
        <img src="paper.jpg" alt="Paper">
    </div>
    <div class="choice" id="scissor">
        <img src="scissor.jpg" alt="Scissors">
    </div>
</div>

<div class="msgcont">
    <p id="msg">Play your game!</p>
</div>

<div class="game-status-box" id="statusBox">
    🤖 Computer is thinking... <br> <span>Pick your move above to battle!</span>
</div>

<button class="reset">Reset Game</button>

<script>
    const resetBtn = document.querySelector(".reset");
    const msg = document.querySelector("#msg");
    const uscores = document.querySelector("#uscore");
    const cscores = document.querySelector("#cscore");
    const statusBox = document.querySelector("#statusBox");
    const choices = document.querySelectorAll(".choice");

    let userscore = 0;
    let cmpscore = 0;

    // Reset setup
    resetBtn.addEventListener("click", () => {
        userscore = 0;
        cmpscore = 0;
        uscores.innerText = "0";
        cscores.innerText = "0";
        msg.innerText = "Play your game!";
        msg.style.backgroundColor = "#4ef037";
        msg.style.boxShadow = "0 4px 10px rgba(78, 240, 55, 0.3)";
        statusBox.innerHTML = "🤖 Computer is thinking... <br> <span>Pick your move above to battle!</span>";
    });

    const compchoice = () => {
        const option = ["rock", "paper", "scissor"];
        const randidx = Math.floor(Math.random() * 3);
        return option[randidx];
    };

    const drawgame = (userchoice, cmpchoice) => {
        msg.innerText = "😐 Game Draw";
        msg.style.backgroundColor = "#ffcc00";
        msg.style.boxShadow = "0 4px 10px rgba(255, 204, 0, 0.3)";
        
        statusBox.innerHTML = `You chose <span>${userchoice.toUpperCase()}</span>. <br> Computer randomly picked <span>${cmpchoice.toUpperCase()}</span>.`;
    };

    const playgame = (userchoice) => {
        const cmpchoice = compchoice(); 

        if (userchoice === cmpchoice) {
            drawgame(userchoice, cmpchoice);
        } else {
            let userwin = true;

            if (userchoice === "rock") {
                userwin = cmpchoice === "paper" ? false : true;
            } 
            else if (userchoice === "paper") {
                userwin = cmpchoice === "scissor" ? false : true;   
            } 
            else if (userchoice === "scissor") {                    
                userwin = cmpchoice === "rock" ? false : true;
            }

            // Update bottom box display with moves
            statusBox.innerHTML = `You chose <span>${userchoice.toUpperCase()}</span>. <br> Computer randomly picked <span>${cmpchoice.toUpperCase()}</span>.`;

            if (userwin) {
                msg.innerText = "🎉 You Win!";
                msg.style.backgroundColor = "#4ef037";
                msg.style.boxShadow = "0 4px 10px rgba(78, 240, 55, 0.3)";
                userscore++;
                uscores.innerText = userscore;
            } else {
                msg.innerText = "😢 You Lose!";
                msg.style.backgroundColor = "#e94560";
                msg.style.boxShadow = "0 4px 10px rgba(233, 69, 96, 0.3)";
                cmpscore++;
                cscores.innerText = cmpscore;
            }
        }
    };

    choices.forEach((choice) => {
        choice.addEventListener("click", () => {
            let chooseid = choice.getAttribute("id");
            playgame(chooseid);
        });
    });
</script>

</body>
</html>
